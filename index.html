<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f3d5e" />
  <meta name="description" content="Control Ametel - Gestión LVS" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon-192.png" />
  <title>Control Ametel · LVS</title>
  <style>
    :root { font-family: Arial, Helvetica, sans-serif; color:#17324a; background:#f4f7fa; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; }
    .hidden { display:none !important; }
    .screen { min-height:100vh; }
    .hero { background:#0f3d5e; color:white; padding:28px 18px 36px; text-align:center; }
    .hero h1 { margin:0 0 6px; font-size:28px; }
    .hero p { margin:0; opacity:.9; }
    .card { max-width:620px; margin:-18px auto 24px; background:white; padding:22px; border-radius:18px;
      box-shadow:0 8px 28px rgba(15,61,94,.15); }
    label { display:block; font-weight:700; margin:14px 0 7px; }
    input, textarea, select { width:100%; padding:14px; border:1px solid #c7d2dc; border-radius:12px; font-size:16px; }
    textarea { min-height:110px; resize:vertical; }
    button { width:100%; border:0; border-radius:12px; padding:14px 16px; font-size:16px; font-weight:700; cursor:pointer; }
    .primary { background:#0f3d5e; color:white; }
    .success { background:#2f8f3a; color:white; }
    .secondary { background:#5d6b78; color:white; }
    .danger { background:#b33a3a; color:white; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin:14px 0; }
    .toolbar button { width:auto; flex:1; min-width:150px; }
    .topbar { background:#0f3d5e; color:#fff; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .topbar strong { font-size:19px; }
    .topbar button { width:auto; padding:9px 13px; background:#fff; color:#0f3d5e; }
    .content { max-width:900px; margin:0 auto; padding:18px; }
    .status { margin-top:14px; padding:12px; border-radius:10px; background:#eef4f8; }
    .error { background:#fdecec; color:#8c2424; }
    .ok { background:#eaf7ec; color:#21652a; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin:18px 0; }
    .stat { background:white; padding:18px; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,.06); }
    .stat b { display:block; font-size:28px; margin-top:6px; }
    .list { display:grid; gap:12px; }
    .item { background:white; padding:16px; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,.06); }
    .item h3 { margin:0 0 8px; }
    .badge { display:inline-block; padding:5px 9px; border-radius:999px; font-size:13px; font-weight:700; }
    .pending { background:#fff1d6; color:#8b5a00; }
    .done { background:#e4f5e7; color:#21652a; }
    small { color:#667787; }
    .empty { text-align:center; padding:24px; background:white; border-radius:14px; color:#667787; }
  </style>
</head>
<body>
  <section id="loginScreen" class="screen">
    <div class="hero">
      <h1>Control Ametel</h1>
      <p>Módulo LVS</p>
    </div>
    <div class="card">
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" autocomplete="username" required />
        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <button class="primary" type="submit" style="margin-top:18px">Entrar</button>
      </form>
      <div id="loginMessage" class="status hidden"></div>
    </div>
  </section>

  <section id="appScreen" class="screen hidden">
    <div class="topbar">
      <div><strong>Control Ametel · LVS</strong><br><small id="userLabel" style="color:#dbe7ef"></small></div>
      <button id="logoutBtn">Salir</button>
    </div>
    <main class="content">
      <div id="adminPanel" class="hidden">
        <h2>Panel de administrador</h2>
        <div class="grid">
          <div class="stat">Pendientes<b id="pendingCount">0</b></div>
          <div class="stat">Realizadas<b id="doneCount">0</b></div>
          <div class="stat">Usuarios<b id="userCount">0</b></div>
        </div>
        <div class="toolbar">
          <button id="seedBtn" class="secondary">Cargar datos de prueba</button>
          <button id="refreshBtn" class="primary">Actualizar</button>
        </div>
      </div>

      <div id="workerPanel" class="hidden">
        <h2>Instalaciones LVS</h2>
      </div>

      <div class="card" style="margin:18px 0 22px; max-width:none;">
        <label for="searchCd">Buscar CD</label>
        <input id="searchCd" placeholder="Ejemplo: 17125" inputmode="numeric" />
        <label for="locationFilter">Localidad</label>
        <select id="locationFilter"><option value="">Todas</option></select>
        <div class="toolbar">
          <button id="searchBtn" class="primary">Buscar</button>
          <button id="clearBtn" class="secondary">Limpiar</button>
        </div>
      </div>

      <div id="installationsList" class="list"></div>
      <div id="appMessage" class="status hidden"></div>
    </main>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut,
      setPersistence, browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, collection, getDocs, query, orderBy,
      updateDoc, addDoc, serverTimestamp, writeBatch
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBpus4hK22UHkfpi0GAJ6Pou1SsUER61CE",
      authDomain: "ametel-lvs-control.firebaseapp.com",
      projectId: "ametel-lvs-control",
      storageBucket: "ametel-lvs-control.firebasestorage.app",
      messagingSenderId: "943022770704",
      appId: "1:943022770704:web:a7e4a7f59ffda022755895"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    await setPersistence(auth, browserLocalPersistence);

    const $ = (id) => document.getElementById(id);
    const state = { profile:null, installations:[], users:[] };

    function showMessage(el, text, type="ok") {
      el.textContent = text;
      el.className = `status ${type}`;
      el.classList.remove("hidden");
    }
    function hideMessage(el) { el.classList.add("hidden"); }

    $("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideMessage($("loginMessage"));
      try {
        await signInWithEmailAndPassword(auth, $("email").value.trim(), $("password").value);
      } catch (err) {
        console.error(err);
        showMessage($("loginMessage"), "No se pudo iniciar sesión. Revisa el correo y la contraseña.", "error");
      }
    });

    $("logoutBtn").addEventListener("click", () => signOut(auth));
    $("refreshBtn").addEventListener("click", loadAll);
    $("searchBtn").addEventListener("click", renderInstallations);
    $("clearBtn").addEventListener("click", () => {
      $("searchCd").value = "";
      $("locationFilter").value = "";
      renderInstallations();
    });

    $("seedBtn").addEventListener("click", async () => {
      if (!confirm("¿Cargar 4 instalaciones de prueba?")) return;
      const sample = [
        { cd:"17125", transformer:"TR1", location:"Carmona", address:"Zona centro", status:"pending" },
        { cd:"17135", transformer:"TR1", location:"Carmona", address:"Polígono industrial", status:"pending" },
        { cd:"60247", transformer:"TR1", location:"Lora del Río", address:"Avenida principal", status:"pending" },
        { cd:"17657", transformer:"TR2", location:"El Viso del Alcor", address:"Camino rural", status:"pending" }
      ];
      const batch = writeBatch(db);
      sample.forEach((x) => {
        const ref = doc(db, "installations", `CD${x.cd}_${x.transformer}`);
        batch.set(ref, { ...x, createdAt:serverTimestamp(), updatedAt:serverTimestamp() }, { merge:true });
      });
      await batch.commit();
      showMessage($("appMessage"), "Datos de prueba cargados.");
      await loadAll();
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        $("loginScreen").classList.remove("hidden");
        $("appScreen").classList.add("hidden");
        return;
      }
      try {
        const profileSnap = await getDoc(doc(db, "users", user.uid));
        if (!profileSnap.exists()) throw new Error("Perfil no encontrado");
        state.profile = profileSnap.data();
        if (state.profile.active === false) throw new Error("Usuario desactivado");
        $("userLabel").textContent = `${state.profile.name || user.email} · ${state.profile.role || "worker"}`;
        $("loginScreen").classList.add("hidden");
        $("appScreen").classList.remove("hidden");
        $("adminPanel").classList.toggle("hidden", state.profile.role !== "admin");
        $("workerPanel").classList.toggle("hidden", state.profile.role === "admin");
        await loadAll();
      } catch (err) {
        console.error(err);
        await signOut(auth);
        showMessage($("loginMessage"), "Tu usuario existe, pero falta su perfil en Firestore o está desactivado.", "error");
      }
    });

    async function loadAll() {
      hideMessage($("appMessage"));
      const instSnap = await getDocs(query(collection(db, "installations"), orderBy("cd")));
      state.installations = instSnap.docs.map(d => ({ id:d.id, ...d.data() }));

      if (state.profile?.role === "admin") {
        const usersSnap = await getDocs(collection(db, "users"));
        state.users = usersSnap.docs.map(d => ({ id:d.id, ...d.data() }));
      }
      updateLocations();
      renderInstallations();
      updateStats();
    }

    function updateLocations() {
      const current = $("locationFilter").value;
      const locations = [...new Set(state.installations.map(x => x.location).filter(Boolean))].sort();
      $("locationFilter").innerHTML = '<option value="">Todas</option>' +
        locations.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join("");
      $("locationFilter").value = current;
    }

    function updateStats() {
      $("pendingCount").textContent = state.installations.filter(x => x.status !== "done").length;
      $("doneCount").textContent = state.installations.filter(x => x.status === "done").length;
      $("userCount").textContent = state.users.length;
    }

    function renderInstallations() {
      const term = $("searchCd").value.trim().toLowerCase().replace(/^cd/, "");
      const loc = $("locationFilter").value;
      const rows = state.installations.filter(x => {
        const matchTerm = !term || String(x.cd || "").toLowerCase().includes(term);
        const matchLoc = !loc || x.location === loc;
        return matchTerm && matchLoc;
      });
      const root = $("installationsList");
      if (!rows.length) {
        root.innerHTML = '<div class="empty">No hay instalaciones para mostrar.</div>';
        return;
      }
      root.innerHTML = rows.map(x => `
        <article class="item">
          <h3>CD${escapeHtml(x.cd || "")} ${escapeHtml(x.transformer || "")}</h3>
          <span class="badge ${x.status === "done" ? "done" : "pending"}">${x.status === "done" ? "Realizada" : "Pendiente"}</span>
          <p><b>Localidad:</b> ${escapeHtml(x.location || "-")}<br>
          <b>Ubicación:</b> ${escapeHtml(x.address || "-")}</p>
          <label>Comentario</label>
          <textarea id="comment_${x.id}" placeholder="Escribe un comentario libre...">${escapeHtml(x.comment || "")}</textarea>
          <div class="toolbar">
            <button class="primary" data-save="${x.id}">Guardar comentario</button>
            ${x.status === "done"
              ? (state.profile?.role === "admin" ? `<button class="secondary" data-pending="${x.id}">Volver a pendiente</button>` : "")
              : `<button class="success" data-done="${x.id}">Finalizar instalación</button>`}
          </div>
          ${x.completedByName ? `<small>Finalizada por ${escapeHtml(x.completedByName)}.</small>` : ""}
        </article>
      `).join("");

      root.querySelectorAll("[data-save]").forEach(btn => btn.onclick = () => saveComment(btn.dataset.save));
      root.querySelectorAll("[data-done]").forEach(btn => btn.onclick = () => setStatus(btn.dataset.done, "done"));
      root.querySelectorAll("[data-pending]").forEach(btn => btn.onclick = () => setStatus(btn.dataset.pending, "pending"));
    }

    async function saveComment(id) {
      const text = $(`comment_${id}`).value.trim();
      await updateDoc(doc(db, "installations", id), {
        comment:text,
        commentBy:auth.currentUser.uid,
        commentByName:state.profile.name || auth.currentUser.email,
        commentAt:serverTimestamp(),
        updatedAt:serverTimestamp()
      });
      await addDoc(collection(db, "installations", id, "comments"), {
        text,
        userId:auth.currentUser.uid,
        userName:state.profile.name || auth.currentUser.email,
        createdAt:serverTimestamp()
      });
      showMessage($("appMessage"), "Comentario guardado.");
      await loadAll();
    }

    async function setStatus(id, status) {
      await updateDoc(doc(db, "installations", id), {
        status,
        completedBy: status === "done" ? auth.currentUser.uid : null,
        completedByName: status === "done" ? (state.profile.name || auth.currentUser.email) : null,
        completedAt: status === "done" ? serverTimestamp() : null,
        updatedAt:serverTimestamp()
      });
      showMessage($("appMessage"), status === "done" ? "Instalación finalizada." : "Instalación devuelta a pendiente.");
      await loadAll();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js").catch(console.error));
    }
  </script>
</body>
</html>
